<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nick Pyati</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'PartsListLocal';
      src: url('PartsList-fixed.woff2') format('woff2');
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0ebe0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.3;
      filter: url(#noise);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 10;
    }

    .top {
      background: #f0ebe0;
      flex: 1;
      display: flex;
      align-items: flex-end;
      padding: 0 clamp(2rem, 6vw, 5rem) clamp(2rem, 4vw, 3rem);
    }

    .bottom {
      background: #b8c9a3;
      flex: 1;
      display: flex;
      align-items: flex-start;
      padding: clamp(1.2rem, 3vw, 2rem) clamp(2rem, 6vw, 5rem) 0;
    }

    h1 {
      font-family: 'PartsListLocal', cursive;
      color: #FFB400;
      font-size: clamp(1.8rem, 5vw, 3rem);
      letter-spacing: 0.15em;
      line-height: 1.1;
    }

    p {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      color: #8a7a5e;
      font-size: clamp(0.7rem, 2vw, 0.9rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <svg style="position:absolute;width:0;height:0">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </svg>
  <div class="top">
    <h1>NICK PYATI</h1>
  </div>
  <div class="bottom">
    <p>Coming Soon</p>
  </div>
</body>
</html>
